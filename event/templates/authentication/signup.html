<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventora</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gradient-to-br from-indigo-100 to-purple-100 min-h-screen flex items-center justify-center px-4"
  >
    <div class="bg-white shadow-2xl rounded-2xl p-6 sm:p-8 w-full max-w-lg">
      <h2
        class="text-xl sm:text-2xl font-bold text-center text-gray-800 mb-5 sm:mb-6"
      >
        Create Account
      </h2>

      {% if success %}
      <div class="mb-4 p-3 bg-green-100 text-green-600 rounded-lg text-sm">
        {{ success }}
      </div>
      {% endif %} {% if form.errors %}
      <div class="mb-4 p-3 bg-red-100 text-red-600 rounded-lg text-sm">
        {{ form.errors }}
      </div>
      {% endif %}

      <form method="post" class="space-y-3 sm:space-y-4">
        {% csrf_token %}

        <div>
          <label class="block text-sm font-medium text-gray-700">Name</label>
          {{ form.name }}
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Email</label>
          {{ form.email }}
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700"
            >Date of Birth</label
          >
          {{ form.dateOfBirth }}
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Phone</label>
          {{ form.phone }}
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700"
            >Password</label
          >
          {{ form.password }}
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700"
            >Confirm Password</label
          >
          {{ form.confirm_password }}
        </div>

        <button
          type="submit"
          class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white py-2 sm:py-2.5 rounded-xl font-semibold hover:from-indigo-600 hover:to-purple-600 transition duration-300 shadow-md"
        >
          Register
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-4">
        Already have an account?
        <a href="{% url 'login' %}" class="text-indigo-600 hover:underline">
          Login
        </a>
      </p>
    </div>
  </body>
</html>
