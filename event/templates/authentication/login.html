<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventora</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gradient-to-br from-indigo-100 to-purple-100 min-h-screen flex items-center justify-center px-4"
  >
    <div class="bg-white shadow-2xl rounded-2xl p-6 sm:p-8 w-full max-w-md">
      <h2
        class="text-xl sm:text-2xl font-bold text-center text-gray-800 mb-5 sm:mb-6"
      >
        Login to Your Account
      </h2>

      {% for message in messages %}
      <div
        class="mb-4 p-3 rounded-lg text-sm {% if message.tags == 'error' %} bg-red-100 text-red-600 {% else %} bg-green-100 text-green-600 {% endif %}"
      >
        {{ message }}
      </div>
      {% endfor %}

      <form method="post" class="space-y-4 sm:space-y-5">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}" />

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Email</label
          >
          {{ form.email }}
          <p class="text-red-500 text-xs mt-1">{{ form.email.errors }}</p>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1"
            >Password</label
          >
          {{ form.password }}
          <p class="text-red-500 text-xs mt-1">{{ form.password.errors }}</p>
        </div>

        <button
          type="submit"
          class="w-full bg-gradient-to-r from-indigo-500 to-purple-500 text-white py-2 sm:py-2.5 rounded-xl font-semibold hover:from-indigo-600 hover:to-purple-600 transition duration-300 shadow-md"
        >
          Login
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-4">
        Don’t have an account?
        <a href="{% url 'signup' %}" class="text-indigo-600 hover:underline">
          Sign up
        </a>
      </p>
    </div>
  </body>
</html>
