<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventora</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-50">
    {% include 'navbar.html' %}
    <div class="w-full">{% include 'banner.html' %}</div>

    <section class="max-w-7xl mx-auto px-4 py-6 md:py-10">
      <div
        class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6"
      >
        <h1 class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-800">
          Explore Events
        </h1>
        <a
          href="{% url 'event' %}"
          class="text-indigo-600 hover:text-indigo-800 font-medium text-sm md:text-base"
        >
          View More →
        </a>
      </div>

      <!-- RESPONSIVE GRID -->
      <div
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 auto-rows-fr"
      >
        {% for event in events %} {% include 'eventcard.html' %} {% endfor %}
      </div>
    </section>

    {% include 'footer.html' %}
  </body>
</html>
