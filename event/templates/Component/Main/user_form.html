<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventora</title>
  </head>

  <body>
    {% extends 'admin_base.html' %} {% block content %}

    <div class="w-full">
      <div
        class="bg-white p-6 md:p-8 rounded-2xl shadow-md w-full overflow-hidden"
      >
        <h2 class="text-2xl font-bold mb-6">
          {% if page == 'update' %} Update User {% else %} Add User {% endif %}
        </h2>

        <form method="POST" class="space-y-6">
          {% csrf_token %}

          <!-- GRID FIX -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Name</label
              >
              {{ form.name }}
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Email</label
              >
              {{ form.email }}
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Date of Birth</label
              >
              {{ form.dob }}
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1"
                >Phone</label
              >
              {{ form.phone }}
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
              Password {% if page == 'update' %} (Leave blank to keep same) {% endif %}
            </label>
            {{ form.password }}
          </div>

          <!-- BUTTON FIX -->
          <div class="pt-2">
            <button
              type="submit"
              class="w-full md:w-auto px-6 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 transition"
            >
              {% if page == 'update' %} Update User {% else %} Save User {% endif %}
            </button>
          </div>
        </form>
      </div>
    </div>

    {% endblock %}
  </body>
</html>
