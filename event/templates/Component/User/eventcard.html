<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventora</title>
  </head>
  <body>
    <div
      class="group bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition duration-300 border flex flex-col h-full w-full"
    >
      <!-- IMAGE -->
      <div
        class="relative bg-gray-100 h-60 sm:h-72 flex items-center justify-center overflow-hidden"
      >
        <img
          src="{{ event.event_image.url }}"
          class="max-h-full max-w-full object-contain group-hover:scale-105 transition duration-500"
        />

        <div class="absolute top-2 sm:top-3 left-2 sm:left-3">
          <span
            class="bg-indigo-600 text-white text-xs px-2 sm:px-3 py-1 rounded-full"
          >
            {{ event.event_category }}
          </span>
        </div>

        <div class="absolute bottom-2 sm:bottom-3 right-2 sm:right-3">
          <span
            class="bg-black/70 text-white text-xs sm:text-sm px-2 sm:px-3 py-1 rounded-lg"
          >
            ₹{{ event.event_price }}
          </span>
        </div>
      </div>

      <!-- CONTENT -->
      <div class="p-3 sm:p-4 flex flex-col flex-grow">
        <h3
          class="text-base sm:text-lg font-semibold text-gray-800 group-hover:text-indigo-600 line-clamp-2"
        >
          {{ event.event_name }}
        </h3>

        <p class="text-xs sm:text-sm text-gray-500 mt-1">
          {{ event.event_date|date:"M d, Y - H:i" }}
        </p>

        <p class="text-xs sm:text-sm text-gray-500 mt-1 line-clamp-1">
          {{ event.event_location }}
        </p>

        <a
          href="{% url 'event_detail' event.id %}"
          class="mt-auto block text-center py-2 rounded-xl text-white font-medium text-sm sm:text-base {% if event.available_seats > 0 %} bg-indigo-600 hover:bg-indigo-700 {% else %} bg-gray-400 cursor-not-allowed {% endif %}"
        >
          {% if event.available_seats > 0 %} 
            View Details 
          {% else %} 
            Sold Out 
          {%endif %}
        </a>
      </div>
    </div>
  </body>
</html>
