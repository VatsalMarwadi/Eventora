<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Eventora</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <footer
      class="mt-20 border-t border-gray-200/60 bg-white/40 dark:bg-gray-900/40 backdrop-blur-sm py-8 text-center text-gray-500 dark:text-gray-400 text-sm"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div
          class="flex flex-col sm:flex-row justify-between items-center gap-4 text-center sm:text-left"
        >
          <!-- LOGO + TEXT -->
          <div
            class="flex items-center justify-center sm:justify-start gap-2 w-full sm:w-auto"
          >
            <div
              class="w-6 h-6 rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-sm"
            >
              <i class="fas fa-calendar-alt text-white text-[10px]"></i>
            </div>
            <p class="text-xs sm:text-sm">
              &copy; 2025 Eventora — Modern Event Management
            </p>
          </div>

          <!-- SOCIAL ICONS -->
          <div class="flex gap-5 justify-center flex-wrap">
            <a
              href="#"
              class="text-gray-500 hover:text-indigo-500 dark:hover:text-indigo-400 transition-all duration-200 hover:scale-110 transform"
            >
              <i class="fab fa-twitter text-lg"></i>
            </a>

            <a
              href="#"
              class="text-gray-500 hover:text-pink-500 dark:hover:text-pink-400 transition-all duration-200 hover:scale-110 transform"
            >
              <i class="fab fa-instagram text-lg"></i>
            </a>

            <a
              href="#"
              class="text-gray-500 hover:text-gray-800 dark:hover:text-gray-300 transition-all duration-200 hover:scale-110 transform"
            >
              <i class="fab fa-github text-lg"></i>
            </a>

            <a
              href="#"
              class="text-gray-500 hover:text-blue-600 dark:hover:text-blue-400 transition-all duration-200 hover:scale-110 transform"
            >
              <i class="fab fa-linkedin-in text-lg"></i>
            </a>
          </div>

          <!-- LINKS -->
          <div class="flex gap-4 text-xs justify-center flex-wrap">
            <a href="#" class="hover:text-indigo-600 transition"
              >Privacy Policy</a
            >
            <span class="text-gray-300">|</span>
            <a href="#" class="hover:text-indigo-600 transition"
              >Terms of Service</a
            >
            <span class="text-gray-300">|</span>
            <a href="#" class="hover:text-indigo-600 transition">Contact</a>
          </div>
        </div>

        <!-- BOTTOM TEXT -->
        <div class="mt-4 text-[11px] opacity-60">
          <i class="fas fa-heart text-red-400 text-xs"></i>
          Crafted for seamless event discovery
        </div>
      </div>
    </footer>
  </body>
</html>
