<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eventora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>

  <body class="bg-gray-50">
    <nav class="bg-white shadow-md sticky top-0 z-50 w-full">
      <!-- TOP BAR -->
      <div
        class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16"
      >
        <!-- LOGO -->
        <a href="{% url 'home' %}" class="text-xl font-bold text-indigo-600">
          Eventora
        </a>

        <!-- DESKTOP SEARCH -->
        <div class="hidden md:flex flex-1 justify-center px-6">
          <form
            method="GET"
            action="{% url 'search' %}"
            class="w-full max-w-md"
          >
            <input
              type="text"
              name="search"
              placeholder="Search events..."
              class="w-full px-4 py-2 border rounded-full focus:outline-none focus:ring-2 focus:ring-indigo-400"
            />
          </form>
        </div>

        <!-- DESKTOP LINKS -->
        <div class="hidden md:flex items-center space-x-6">
          <a
            href="{% url 'home' %}"
            class="text-gray-700 hover:text-indigo-600"
          >
            Home
          </a>

          <a
            href="{% url 'event' %}"
            class="text-gray-700 hover:text-indigo-600"
          >
            Events
          </a>

          <a
            href="{% url 'userbookings' request.session.user_id %}"
            class="text-gray-700 hover:text-indigo-600"
          >
            View Bookings
          </a>

          <!-- PROFILE / LOGIN -->
          <a
            href="{% if request.session.user_id %}{% url 'profile' %}{% else %}{% url 'login' %}{% endif %}"
            class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 transition"
          >
            {% if request.session.user_id %} 
              {{ request.session.user_name }} 
            {% else %} 
              Login 
            {% endif %}
          </a>
        </div>

        <!-- MOBILE BUTTON -->
        <button id="menu-btn" class="md:hidden text-gray-700 text-xl">
          <i class="fas fa-bars"></i>
        </button>
      </div>

      <!-- MOBILE MENU -->
      <div id="mobile-menu" class="hidden md:hidden px-4 pb-4 border-t">
        <form method="GET" action="{% url 'search' %}" class="py-2">
          <input
            type="text"
            name="search"
            placeholder="Search events..."
            class="w-full px-4 py-2 border rounded-lg"
          />
        </form>

        <a
          href="{% url 'home' %}"
          class="block py-2 text-gray-700 hover:text-indigo-600"
        >
          Home
        </a>

        <a
          href="{% url 'event' %}"
          class="block py-2 text-gray-700 hover:text-indigo-600"
        >
          Events
        </a>

        <a
          href="{% url 'userbookings' request.session.user_id %}"
          class="block py-2 text-gray-700 hover:text-indigo-600"
        >
          view Bookings
        </a>

        <!-- MOBILE PROFILE / LOGIN -->
        <a
          href="{% if request.session.user_id %}{% url 'profile' %}{% else %}{% url 'login' %}{% endif %}"
          class="block mt-3 bg-indigo-600 text-white text-center py-2 rounded-lg"
        >
          {% if request.session.user_id %} 
            {{ request.session.user_name }} 
          {% else %} 
            Login 
          {% endif %}
        </a>
      </div>
    </nav>

    <script>
      const btn = document.getElementById("menu-btn");
      const menu = document.getElementById("mobile-menu");

      btn.addEventListener("click", () => {
        menu.classList.toggle("hidden");
      });
    </script>
  </body>
</html>
